# True color support
set -g default-terminal "tmux-256color"

# Enable RGB for the outer terminal based on COLORTERM (set by shellrc
# before tmux starts), rather than enumerating terminal names
%if "#{==:#{COLORTERM},truecolor}"
  set -asF terminal-features "#{TERM}:RGB"
%endif

# Pass COLORTERM and SSH_CONNECTION through when reattaching to an existing server
set -ga update-environment "COLORTERM"
set -ga update-environment "SSH_CONNECTION"

# Forward the active pane's title to the outer terminal as the tab/window
# title (OSC 0/2). Without this, Ghostty falls back to "tmux". We use #T
# (pane_title) rather than #{pane_current_command} so that apps which
# actively maintain their own title via OSC sequences — notably Claude
# Code, which streams session state into the title — pass through
# transparently. Shell panes get whatever shell integration sets (cwd,
# last command, etc.).
set -g set-titles on
set -g set-titles-string "#T"

# --- Core options ---
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# Extended keys (CSI u) — let modified keys like Shift+Enter, Ctrl+Enter,
# Ctrl+;, etc. reach apps inside tmux. `always` forwards them even when
# the inner app didn't request them; `csi-u` uses the standard encoding
# (tmux's default `xterm` format isn't recognized by Claude Code's extended
# keyboard support); `extkeys` advertises CSI u support to tmux for the
# outer xterm-family terminal (Ghostty included). `hyperlinks` lets tmux
# re-emit OSC 8 hyperlinks to the outer terminal instead of stripping them.
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys:hyperlinks'

# Workaround for Claude Code 2.1.117+ regression where CSI-u Shift+Enter
# (`\e[13;2u`) no longer inserts a newline in the REPL. We intercept S-Enter
# at tmux and forward C-j (0x0a), which is Claude Code's alternate newline
# binding and bypasses the broken CSI-u return-key parser. Gated on the
# @claude-running pane/session option, which the `claude` shell wrapper
# sets while claude is running, so other panes see S-Enter as a normal
# Enter.
# TODO: remove this workaround (and the @claude-running toggles in
# shellrc's claude() wrapper) once upstream ships a fix. Tracking:
# https://github.com/anthropics/claude-code/issues/50159
# https://github.com/anthropics/claude-code/issues/52812
bind -T root S-Enter if-shell -F "#{@claude-running}" \
  "send-keys C-j" \
  "send-keys Enter"

# --- Key bindings ---

# Reload config — capital R to avoid ergonomic clash with tmux-resurrect's
# prefix + C-r (restore), which is easy to fire by accident while still
# holding Ctrl from the prefix.
bind R source-file ~/.tmux.conf \; display "Reloaded"

# Splits and new window inherit current pane's cwd
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# OSC 52 — let tmux emit clipboard escape sequences so yanks reach the
# outer terminal's clipboard, including over SSH. tmux-yank (below) layers
# external pbcopy/xclip/wl-copy on top for local-host fallback.
set -g set-clipboard on

# --- Status bar ---
set -g status-position bottom
set -g status-left "[#S] "
set -g status-right "#h %H:%M %Y-%m-%d"
set -g status-left-length 30
set -g status-right-length 50

# Color scheme — light blue locally, light green over SSH (mirrors zshrc:26-30)
if-shell '[ -n "$SSH_CONNECTION" ]' {
  set -g status-style "bg=colour114 fg=colour232"
  set -g pane-active-border-style "fg=colour114"
} {
  set -g status-style "bg=colour117 fg=colour232"
  set -g pane-active-border-style "fg=colour117"
}
set -g pane-border-style "fg=colour240"

# --- Plugins (managed by TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (must come after @plugin declarations)
run '~/.tmux/plugins/tpm/tpm'

# --- Local override (sourced last so it overrides base config and plugins) ---
if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"
