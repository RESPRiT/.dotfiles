# True color support
set -g default-terminal "tmux-256color"

# Enable RGB for the outer terminal based on COLORTERM (set by shellrc
# before tmux starts), rather than enumerating terminal names
%if "#{==:#{COLORTERM},truecolor}"
  set -asF terminal-features "#{TERM}:RGB"
%endif

# Pass COLORTERM and SSH_CONNECTION through when reattaching to an existing server
set -ga update-environment "COLORTERM"
set -ga update-environment "SSH_CONNECTION"

# --- Core options ---
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# --- Key bindings ---

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Splits and new window inherit current pane's cwd
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# OSC 52 — let tmux emit clipboard escape sequences so yanks reach the
# outer terminal's clipboard, including over SSH. tmux-yank (below) layers
# external pbcopy/xclip/wl-copy on top for local-host fallback.
set -g set-clipboard on

# --- Status bar ---
set -g status-position bottom
set -g status-left "[#S] "
set -g status-right "#h %H:%M %Y-%m-%d"
set -g status-left-length 30
set -g status-right-length 50

# Color scheme — light blue locally, light green over SSH (mirrors zshrc:26-30)
if-shell '[ -n "$SSH_CONNECTION" ]' {
  set -g status-style "bg=colour114 fg=colour232"
  set -g pane-active-border-style "fg=colour114"
} {
  set -g status-style "bg=colour117 fg=colour232"
  set -g pane-active-border-style "fg=colour117"
}
set -g pane-border-style "fg=colour240"

# --- Plugins (managed by TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (must come after @plugin declarations)
run '~/.tmux/plugins/tpm/tpm'

# --- Local override (sourced last so it overrides base config and plugins) ---
if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"
